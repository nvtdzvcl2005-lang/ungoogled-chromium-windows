name: Build Antidetect Drive-Cache
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    env:
      # Cấu hình Rclone trực tiếp từ biến môi trường (Né sạch lỗi parse file)
      RCLONE_CONFIG_GDRIVE_TYPE: drive
      RCLONE_CONFIG_GDRIVE_SERVICE_ACCOUNT_CONTENTS: ${{ secrets.GDRIVE_JSON }}
      RCLONE_CONFIG_GDRIVE_ROOT_FOLDER_ID: 1uznny42MrfIE4PSBOTEDfe34H46i6qkR
      PYTHONUTF8: 1
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Environment & Download Rclone
        run: |
          git config --global core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v "LongPathsEnabled" /t REG_DWORD /d 1 /f
          python -m pip install httplib2==0.22.0 six
          # Tải nhanh rclone.exe
          curl -L https://downloads.rclone.org/rclone-current-windows-amd64.zip -o rclone.zip
          powershell -Command "Expand-Archive rclone.zip -DestinationPath ."
          $dir = Get-ChildItem -Directory -Filter "rclone-*" | Select-Object -First 1
          Move-Item "$($dir.FullName)\rclone.exe" . -Force

      - name: Restore Cache from Drive
        run: |
          mkdir -p ~/.cache/sccache
          ./rclone sync gdrive:sccache ~/.cache/sccache --verbose
        continue-on-error: true

      - name: Setup Sccache
        uses: mozilla-actions/sccache-action@v0.0.3

      - name: Clone Source
        run: python ungoogled-chromium/utils/clone.py -o build/src

      - name: Apply Spoof Patcher
        run: python spoof_patcher.py

      - name: Official Build
        env:
          SCCACHE_GHA_ENABLED: "false"
          SCCACHE_DIR: "~/.cache/sccache"
        run: |
          echo 'cc_wrapper="sccache"' >> flags.windows.gn
          python build.py
          python package.py

      - name: Save Cache & Artifacts to Drive
        if: always()
        run: |
          ./rclone sync ~/.cache/sccache gdrive:sccache --verbose
          ./rclone copy build/ gdrive:Build_Thanh_Pham/ --include "*.zip" --include "*.exe"
