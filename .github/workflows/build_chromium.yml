name: Build Antidetect Stable-Sync
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Environment & Download Rclone
        run: |
          git config --global core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v "LongPathsEnabled" /t REG_DWORD /d 1 /f
          python -m pip install httplib2==0.22.0 six
          curl -L https://downloads.rclone.org/rclone-current-windows-amd64.zip -o rclone.zip
          powershell -Command "Expand-Archive rclone.zip -DestinationPath ."
          $dir = Get-ChildItem -Directory -Filter "rclone-*" | Select-Object -First 1
          Move-Item "$($dir.FullName)\rclone.exe" . -Force

      # DÙNG PYTHON GHI CONFIG ĐỂ TRÁNH LỖI MÃ HÓA (ENCODING)
      - name: Generate Rclone Config
        env:
          GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
        run: |
          python -c "import os; content = '[gdrive]\ntype = drive\nservice_account_contents = ' + os.environ['GDRIVE_JSON'] + '\nroot_folder_id = 1uznny42MrfIE4PSBOTEDfe34H46i6qkR'; open('rclone.conf', 'w', encoding='utf-8').write(content)"

      - name: Restore Cache from Drive
        run: |
          mkdir -p ~/.cache/sccache
          ./rclone --config rclone.conf sync gdrive:sccache ~/.cache/sccache --verbose
        continue-on-error: true

      - name: Setup Sccache
        uses: mozilla-actions/sccache-action@v0.0.3

      - name: Clone Source
        run: python ungoogled-chromium/utils/clone.py -o build/src

      - name: Apply Spoof Patcher
        run: python spoof_patcher.py

      - name: Official Build (Auto-Stop at 4h)
        env:
          SCCACHE_GHA_ENABLED: "false"
          SCCACHE_DIR: "~/.cache/sccache"
        shell: pwsh
        run: |
          echo 'cc_wrapper="sccache"' >> flags.windows.gn
          $proc = Start-Process python -ArgumentList "build.py" -PassThru -NoNewWindow
          if (!($proc.WaitForExit(14400000))) { 
            Write-Host "--- Hết 4 tiếng. Đang dừng để lưu cache! ---"
            Stop-Process -Id $proc.Id -Force 
          }
          python package.py
        continue-on-error: true

      - name: Save Cache & Artifacts (Always Run)
        if: always()
        run: |
          ./rclone --config rclone.conf sync ~/.cache/sccache gdrive:sccache --verbose
          ./rclone --config rclone.conf copy build/ gdrive:Build_Thanh_Pham/ --include "*.zip" --include "*.exe"
